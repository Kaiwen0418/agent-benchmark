name: Bug report
description: Report a reproducible defect
title: "fix(area): "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps, commands, or a repository link. Remove credentials and private data.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      placeholder: Commit SHA, branch, or deployment environment
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, Node.js version, and relevant service versions.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
