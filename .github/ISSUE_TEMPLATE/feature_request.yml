name: Feature request
description: Propose a focused enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or benchmark problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior, scope, and alternatives considered.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Operational impact
      description: Note schema, API, deployment, security, or compatibility implications.
