name: Deploy Runner Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"
          OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "runner_image=${REGISTRY}/${OWNER}/agentbench-runner-mcp" >> "$GITHUB_OUTPUT"
          echo "mock_image=${REGISTRY}/${OWNER}/agentbench-mock-sites" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/runner-mcp.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.runner_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.runner_image }}:latest-main

      - name: Build and push mock-sites image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/mock-sites.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.mock_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.mock_image }}:latest-main

  deploy-server:
    runs-on:
      - self-hosted
      - linux
      - agentbench-prod
    needs:
      - build-and-push-images
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy on self-hosted runner
        env:
          IMAGE_TAG: ${{ needs.build-and-push-images.outputs.image_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          AGENTBENCH_WEB_URL: ${{ secrets.AGENTBENCH_WEB_URL }}
          RUNNER_SHARED_SECRET: ${{ secrets.RUNNER_SHARED_SECRET }}
          RUNNER_MCP_PUBLIC_BASE_URL: ${{ secrets.RUNNER_MCP_PUBLIC_BASE_URL }}
        run: |
            set -euo pipefail
            OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
            RUNNER_IMAGE="ghcr.io/${OWNER}/agentbench-runner-mcp"
            MOCK_IMAGE="ghcr.io/${OWNER}/agentbench-mock-sites"

            cat > .env.server <<EOF
            RUNNER_MCP_IMAGE=${RUNNER_IMAGE}
            MOCK_SITES_IMAGE=${MOCK_IMAGE}
            IMAGE_TAG=${IMAGE_TAG}
            AGENTBENCH_WEB_URL=${AGENTBENCH_WEB_URL}
            RUNNER_SHARED_SECRET=${RUNNER_SHARED_SECRET}
            RUNNER_MCP_PUBLIC_BASE_URL=${RUNNER_MCP_PUBLIC_BASE_URL}
            EOF

            docker login ghcr.io -u "${GHCR_USERNAME}" -p "${GHCR_PAT}"
            docker-compose --env-file .env.server -f infra/docker/docker-compose.server.yml pull
            docker-compose --env-file .env.server -f infra/docker/docker-compose.server.yml up -d

            # Basic smoke checks
            curl -fsS http://localhost:8080/healthz > /dev/null
            curl -fsS -o /dev/null -w "%{http_code}" http://localhost:8080/mcp | grep -E "^(405|400)$" > /dev/null
