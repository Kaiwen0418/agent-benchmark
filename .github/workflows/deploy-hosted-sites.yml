name: Deploy Hosted Sites

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main
    paths:
      - '.github/workflows/deploy-hosted-sites.yml'
      - 'apps/hosted-sites/**'
      - 'apps/hosted-orchestrator/**'
      - 'packages/scoring/**'
      - 'packages/shared/**'
      - 'supabase/migrations/**'
      - 'infra/docker/hosted-sites.Dockerfile'
      - 'infra/docker/hosted-orchestrator.Dockerfile'
      - 'infra/docker/docker-compose.server.yml'
      - 'infra/nginx/**'
      - 'infra/scripts/classify-hosted-deploy-changes.sh'
      - 'infra/scripts/deploy-hosted-stack.sh'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'turbo.json'

permissions:
  contents: read

concurrency:
  group: hosted-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    outputs:
      image_channel: ${{ steps.environment.outputs.image_channel }}
    steps:
      - name: Select deployment environment
        id: environment
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_REF}" in
            refs/heads/develop)
              echo "image_channel=develop" >> "${GITHUB_OUTPUT}"
              ;;
            refs/heads/main)
              echo "image_channel=main" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Hosted deployment is only allowed from develop or main; received ${GITHUB_REF}." >&2
              exit 1
              ;;
          esac

  detect-changes:
    needs: validate-ref
    runs-on: ubuntu-latest
    outputs:
      hosted_sites: ${{ steps.changes.outputs.hosted_sites }}
      orchestrator: ${{ steps.changes.outputs.orchestrator }}
      infra: ${{ steps.changes.outputs.infra }}
      topology: ${{ steps.changes.outputs.topology }}
      image_tag: ${{ steps.changes.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect affected services
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          CHANGES_FILE="$(mktemp)"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            printf '%s\n' \
              'hosted_sites=true' \
              'orchestrator=true' \
              'infra=true' \
              'topology=true' > "${CHANGES_FILE}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="HEAD^"
            fi
            git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}" | tee /dev/stderr | \
              bash infra/scripts/classify-hosted-deploy-changes.sh > "${CHANGES_FILE}"
          fi

          cat "${CHANGES_FILE}" >> "${GITHUB_OUTPUT}"
          hosted_sites="$(sed -n 's/^hosted_sites=//p' "${CHANGES_FILE}")"
          orchestrator="$(sed -n 's/^orchestrator=//p' "${CHANGES_FILE}")"
          infra="$(sed -n 's/^infra=//p' "${CHANGES_FILE}")"
          topology="$(sed -n 's/^topology=//p' "${CHANGES_FILE}")"
          {
            echo "## Hosted deployment targets"
            echo
            echo "Branch: \`${GITHUB_REF_NAME}\`"
            echo "Image channel: \`${{ needs.validate-ref.outputs.image_channel }}\`"
            echo
            echo "| Target | Changed |"
            echo "| --- | --- |"
            echo "| hosted-sites | ${hosted_sites} |"
            echo "| hosted-orchestrator | ${orchestrator} |"
            echo "| nginx | ${infra} |"
            echo "| compose topology | ${topology} |"
            echo
            echo "Image tag: \`${IMAGE_TAG}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  verify:
    needs: validate-ref
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_TEST_URL: redis://127.0.0.1:6379
      ORCHESTRATOR_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository verification
        run: pnpm verify:ci

  build-hosted-sites:
    needs:
      - validate-ref
      - detect-changes
      - verify
    if: needs.detect-changes.outputs.hosted_sites == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${OWNER}/agentbench-hosted-sites" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hosted-sites image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/docker/hosted-sites.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ needs.detect-changes.outputs.image_tag }}
            ${{ steps.meta.outputs.image }}:latest-${{ needs.validate-ref.outputs.image_channel }}

  build-orchestrator:
    needs:
      - validate-ref
      - detect-changes
      - verify
    if: needs.detect-changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${OWNER}/agentbench-hosted-orchestrator" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hosted-orchestrator image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/docker/hosted-orchestrator.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ needs.detect-changes.outputs.image_tag }}
            ${{ steps.meta.outputs.image }}:latest-${{ needs.validate-ref.outputs.image_channel }}

  migrate-development:
    if: github.ref == 'refs/heads/develop'
    runs-on:
      - self-hosted
      - linux
      - agentbench-dev
    environment: development
    needs:
      - validate-ref
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v1
        with:
          version: 2.75.0

      - name: Apply development database migrations
        env:
          TEST_SUPABASE_DB_URL: ${{ secrets.TEST_SUPABASE_DB_URL }}
        run: bash scripts/db-migrate.sh test

  migrate-production:
    if: github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - linux
      - agentbench-prod
    environment: production
    needs:
      - validate-ref
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v1
        with:
          version: 2.75.0

      - name: Apply production database migrations
        env:
          PROD_SUPABASE_DB_URL: ${{ secrets.PROD_SUPABASE_DB_URL }}
        run: bash scripts/db-migrate.sh production

  deploy-development:
    if: |
      always() &&
      github.ref == 'refs/heads/develop' &&
      needs.detect-changes.result == 'success' &&
      needs.migrate-development.result == 'success' &&
      (needs.build-hosted-sites.result == 'success' || needs.build-hosted-sites.result == 'skipped') &&
      (needs.build-orchestrator.result == 'success' || needs.build-orchestrator.result == 'skipped')
    runs-on:
      - self-hosted
      - linux
      - agentbench-dev
    environment: development
    needs:
      - detect-changes
      - build-hosted-sites
      - build-orchestrator
      - migrate-development
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Deploy development stack
        env:
          DEPLOYMENT_ENVIRONMENT: development
          COMPOSE_PROJECT_NAME: agentbench-development
          IMAGE_CHANNEL: develop
          IMAGE_TAG: ${{ needs.detect-changes.outputs.image_tag }}
          HOSTED_SITES_CHANGED: ${{ needs.detect-changes.outputs.hosted_sites }}
          ORCHESTRATOR_CHANGED: ${{ needs.detect-changes.outputs.orchestrator }}
          INFRA_CHANGED: ${{ needs.detect-changes.outputs.infra }}
          TOPOLOGY_CHANGED: ${{ needs.detect-changes.outputs.topology }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          AGENTBENCH_WEB_URL: ${{ vars.AGENTBENCH_WEB_URL }}
          RUNNER_SHARED_SECRET: ${{ secrets.RUNNER_SHARED_SECRET }}
          HOSTED_SITES_PUBLIC_URL: ${{ vars.HOSTED_SITES_PUBLIC_URL }}
          HOSTED_ORCHESTRATOR_PUBLIC_URL: ${{ vars.HOSTED_ORCHESTRATOR_PUBLIC_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GATEWAY_HTTP_PORT: ${{ vars.GATEWAY_HTTP_PORT || '8081' }}
        run: bash infra/scripts/deploy-hosted-stack.sh

  deploy-production:
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result == 'success' &&
      needs.migrate-production.result == 'success' &&
      (needs.build-hosted-sites.result == 'success' || needs.build-hosted-sites.result == 'skipped') &&
      (needs.build-orchestrator.result == 'success' || needs.build-orchestrator.result == 'skipped')
    runs-on:
      - self-hosted
      - linux
      - agentbench-prod
    environment: production
    needs:
      - detect-changes
      - build-hosted-sites
      - build-orchestrator
      - migrate-production
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Deploy production stack
        env:
          DEPLOYMENT_ENVIRONMENT: production
          COMPOSE_PROJECT_NAME: agentbench-production
          IMAGE_CHANNEL: main
          IMAGE_TAG: ${{ needs.detect-changes.outputs.image_tag }}
          HOSTED_SITES_CHANGED: ${{ needs.detect-changes.outputs.hosted_sites }}
          ORCHESTRATOR_CHANGED: ${{ needs.detect-changes.outputs.orchestrator }}
          INFRA_CHANGED: ${{ needs.detect-changes.outputs.infra }}
          TOPOLOGY_CHANGED: ${{ needs.detect-changes.outputs.topology }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          AGENTBENCH_WEB_URL: ${{ vars.AGENTBENCH_WEB_URL }}
          RUNNER_SHARED_SECRET: ${{ secrets.RUNNER_SHARED_SECRET }}
          HOSTED_SITES_PUBLIC_URL: ${{ vars.HOSTED_SITES_PUBLIC_URL }}
          HOSTED_ORCHESTRATOR_PUBLIC_URL: ${{ vars.HOSTED_ORCHESTRATOR_PUBLIC_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GATEWAY_HTTP_PORT: ${{ vars.GATEWAY_HTTP_PORT || '8080' }}
        run: bash infra/scripts/deploy-hosted-stack.sh
