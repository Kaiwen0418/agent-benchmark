name: Deploy Hosted Sites

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"
          OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "hosted_image=${REGISTRY}/${OWNER}/agentbench-hosted-sites" >> "$GITHUB_OUTPUT"
          echo "orchestrator_image=${REGISTRY}/${OWNER}/agentbench-hosted-orchestrator" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hosted-sites image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/hosted-sites.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.hosted_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.hosted_image }}:latest-main

      - name: Build and push hosted-orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/hosted-orchestrator.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.orchestrator_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.orchestrator_image }}:latest-main

  deploy-server:
    runs-on:
      - self-hosted
      - linux
      - agentbench-prod
    needs:
      - build-and-push-images
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy on self-hosted runner
        env:
          IMAGE_TAG: ${{ needs.build-and-push-images.outputs.image_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          AGENTBENCH_WEB_URL: ${{ secrets.AGENTBENCH_WEB_URL }}
          RUNNER_SHARED_SECRET: ${{ secrets.RUNNER_SHARED_SECRET }}
          HOSTED_SITES_PUBLIC_URL: ${{ secrets.HOSTED_SITES_PUBLIC_URL }}
          HOSTED_ORCHESTRATOR_PUBLIC_URL: ${{ secrets.HOSTED_ORCHESTRATOR_PUBLIC_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GATEWAY_HTTP_PORT: ${{ vars.GATEWAY_HTTP_PORT || '8080' }}
        run: |
            set -euo pipefail
            OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
            HOSTED_IMAGE="ghcr.io/${OWNER}/agentbench-hosted-sites"
            ORCHESTRATOR_IMAGE="ghcr.io/${OWNER}/agentbench-hosted-orchestrator"
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "docker compose plugin or docker-compose is required on the self-hosted runner." >&2
              exit 127
            fi

            cat > .env.server <<EOF
            HOSTED_SITES_IMAGE=${HOSTED_IMAGE}
            HOSTED_ORCHESTRATOR_IMAGE=${ORCHESTRATOR_IMAGE}
            IMAGE_TAG=${IMAGE_TAG}
            AGENTBENCH_WEB_URL=${AGENTBENCH_WEB_URL}
            RUNNER_SHARED_SECRET=${RUNNER_SHARED_SECRET}
            HOSTED_SITES_PUBLIC_URL=${HOSTED_SITES_PUBLIC_URL}
            HOSTED_ORCHESTRATOR_URL=http://hosted-orchestrator:3004
            HOSTED_ORCHESTRATOR_PUBLIC_URL=${HOSTED_ORCHESTRATOR_PUBLIC_URL}
            NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
            SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            GATEWAY_HTTP_PORT=${GATEWAY_HTTP_PORT}
            EOF

            test -f infra/caddy/Caddyfile.hosted-sites
            ${COMPOSE} --env-file .env.server -f infra/docker/docker-compose.server.yml config >/tmp/agentbench-compose.yml
            grep -F "infra/caddy/Caddyfile.hosted-sites" /tmp/agentbench-compose.yml >/dev/null

            printf '%s' "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            ${COMPOSE} --env-file .env.server -f infra/docker/docker-compose.server.yml pull
            ${COMPOSE} --env-file .env.server -f infra/docker/docker-compose.server.yml up -d
            ${COMPOSE} --env-file .env.server -f infra/docker/docker-compose.server.yml up -d --force-recreate --no-deps gateway

            dump_deploy_logs() {
              ${COMPOSE} --env-file .env.server -f infra/docker/docker-compose.server.yml ps || true
              ${COMPOSE} --env-file .env.server -f infra/docker/docker-compose.server.yml logs --tail=120 gateway hosted-sites hosted-orchestrator || true
            }

            smoke_check() {
              curl -fsS "http://localhost:${GATEWAY_HTTP_PORT}/health" > /dev/null
            }

            for attempt in $(seq 1 30); do
              if smoke_check; then
                exit 0
              fi
              echo "Smoke check failed; retrying (${attempt}/30)."
              sleep 2
            done

            dump_deploy_logs
            exit 1
