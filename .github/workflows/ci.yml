name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web build

      - name: Build runner
        run: pnpm --filter runner build

      - name: Build mock-sites
        run: pnpm --filter mock-sites build
