name: Hosted Variant Sweep

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: hosted-variant-sweep-development
  cancel-in-progress: false

jobs:
  dispatch-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch sweep from develop
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run hosted-variant-sweep.yml --ref develop --repo "${GITHUB_REPOSITORY}"

  sweep-development:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop'
    runs-on:
      - self-hosted
      - linux
      - agentbench-dev
    environment: development
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        benchmark_case_slug:
          - hosted-web-suite
          - hosted-web-hard-suite
        generation_seed:
          - full-pool-919
          - full-pool-611
          - full-pool-264
          - full-pool-962
          - full-pool-744
          - full-pool-412
          - full-pool-953
    steps:
      - name: Checkout develop
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: develop
          persist-credentials: false

      - name: Run deterministic full-pool lifecycle smoke
        env:
          START_LOCAL_SERVICES: "false"
          SMOKE_MODE: full-pass
          BENCHMARK_CASE_SLUG: ${{ matrix.benchmark_case_slug }}
          GENERATION_SEED: ${{ matrix.generation_seed }}
          HOSTED_SITES_PUBLIC_URL: ${{ vars.HOSTED_SITES_PUBLIC_URL }}
          HOSTED_ORCHESTRATOR_PUBLIC_URL: ${{ vars.HOSTED_ORCHESTRATOR_PUBLIC_URL }}
          AGENTBENCH_WEB_URL: ${{ vars.AGENTBENCH_WEB_URL }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUNNER_SHARED_SECRET: ${{ secrets.RUNNER_SHARED_SECRET }}
        run: bash tests/e2e/hosted-lifecycle-smoke.sh
