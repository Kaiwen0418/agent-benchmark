name: Deploy Web

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

permissions: {}

concurrency:
  group: web-production
  cancel-in-progress: false

jobs:
  deploy-web:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - name: Verify production branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Production deployment is only allowed from main; received ${GITHUB_REF}." >&2
            exit 1
          fi

      - name: Trigger Vercel deploy hook (optional)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set. Assuming Vercel Git integration handles deployment."
            exit 0
          fi

          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
