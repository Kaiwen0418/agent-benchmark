name: Model Catalog Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * *"

permissions:
  contents: read

concurrency:
  group: model-catalog-sync-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  dispatch-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    strategy:
      matrix:
        ref:
          - develop
          - main
    steps:
      - name: Dispatch environment sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run model-catalog-sync.yml --ref "${{ matrix.ref }}" --repo "${GITHUB_REPOSITORY}"

  sync:
    if: github.event_name == 'workflow_dispatch' && (github.ref_name == 'develop' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        source:
          - openrouter
          - litellm
          - openai
          - anthropic
          - google
          - xai
          - kimi
          - deepseek
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync ${{ matrix.source }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          test -n "${SUPABASE_URL}"
          test -n "${SUPABASE_SERVICE_ROLE_KEY}"
          pnpm --filter @agentbench/model-catalog-sync sync "${{ matrix.source }}"
