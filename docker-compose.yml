name: agentbench-hosted-sites

services:
  hosted-orchestrator:
    image: agentbench-hosted-orchestrator:local
    build:
      context: .
      dockerfile: infra/docker/hosted-orchestrator.Dockerfile
    environment:
      HOSTED_ORCHESTRATOR_PORT: 3004
      HOSTED_ORCHESTRATOR_PUBLIC_URL: http://hosted-orchestrator:3004
      HOSTED_SITES_URL: http://hosted-sites:3003
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL:-}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ORCHESTRATOR_REDIS_URL: redis://redis:6379
      ORCHESTRATOR_MODE: api
      ORCHESTRATOR_PARTITION_COUNT: 16
    depends_on:
      - redis
    restart: unless-stopped

  hosted-orchestrator-worker-0:
    image: agentbench-hosted-orchestrator:local
    environment:
      HOSTED_SITES_URL: http://hosted-sites:3003
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL:-}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ORCHESTRATOR_REDIS_URL: redis://redis:6379
      ORCHESTRATOR_MODE: worker
      ORCHESTRATOR_PARTITION_COUNT: 16
      ORCHESTRATOR_WORKER_PARTITIONS: 0,1,2,3,4,5,6,7
    depends_on:
      - redis
    restart: unless-stopped

  hosted-orchestrator-worker-1:
    image: agentbench-hosted-orchestrator:local
    environment:
      HOSTED_SITES_URL: http://hosted-sites:3003
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL:-}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ORCHESTRATOR_REDIS_URL: redis://redis:6379
      ORCHESTRATOR_MODE: worker
      ORCHESTRATOR_PARTITION_COUNT: 16
      ORCHESTRATOR_WORKER_PARTITIONS: 8,9,10,11,12,13,14,15
    depends_on:
      - redis
    restart: unless-stopped

  hosted-sites:
    build:
      context: .
      dockerfile: infra/docker/hosted-sites.Dockerfile
    environment:
      HOSTED_SITES_PORT: 3003
      HOSTED_SITES_PUBLIC_URL: ${HOSTED_SITES_PUBLIC_URL:-http://localhost:8080}
      HOSTED_ORCHESTRATOR_URL: http://hosted-orchestrator:3004
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL:-}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-}
      HOSTED_SESSION_REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/hosted-sites.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hosted-orchestrator
      - hosted-orchestrator-worker-0
      - hosted-orchestrator-worker-1
      - hosted-sites
      - redis
    restart: unless-stopped
