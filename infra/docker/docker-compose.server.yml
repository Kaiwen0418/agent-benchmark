name: ${COMPOSE_PROJECT_NAME:-agentbench-hosted-sites}

x-orchestrator-environment: &orchestrator-environment
  HOSTED_ORCHESTRATOR_PORT: 3004
  HOSTED_ORCHESTRATOR_PUBLIC_URL: ${HOSTED_ORCHESTRATOR_PUBLIC_URL}
  HOSTED_SITES_URL: http://hosted-sites:3003
  HOSTED_SITES_PUBLIC_URL: ${HOSTED_SITES_PUBLIC_URL}
  AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL}
  RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  ORCHESTRATOR_REDIS_URL: ${ORCHESTRATOR_REDIS_URL}
  ORCHESTRATOR_PARTITION_COUNT: ${ORCHESTRATOR_PARTITION_COUNT:-16}
  HOSTED_SESSION_SWEEP_INTERVAL_MS: ${HOSTED_SESSION_SWEEP_INTERVAL_MS:-60000}
  HOSTED_ACCESS_LOG_RETENTION_MS: ${HOSTED_ACCESS_LOG_RETENTION_MS:-1209600000}
  ORCHESTRATOR_DLQ_DEAD_RETENTION_MS: ${ORCHESTRATOR_DLQ_DEAD_RETENTION_MS:-7776000000}
  ORCHESTRATOR_DLQ_RESOLVED_RETENTION_MS: ${ORCHESTRATOR_DLQ_RESOLVED_RETENTION_MS:-2592000000}
  ORCHESTRATOR_DLQ_PRUNE_BATCH_SIZE: ${ORCHESTRATOR_DLQ_PRUNE_BATCH_SIZE:-500}

services:
  hosted-orchestrator:
    image: ${HOSTED_ORCHESTRATOR_IMAGE}:${HOSTED_ORCHESTRATOR_IMAGE_TAG:-latest-main}
    environment:
      <<: *orchestrator-environment
      ORCHESTRATOR_MODE: api
    depends_on:
      - orchestrator-redis
    restart: unless-stopped

  hosted-orchestrator-worker-0:
    image: ${HOSTED_ORCHESTRATOR_IMAGE}:${HOSTED_ORCHESTRATOR_IMAGE_TAG:-latest-main}
    environment:
      <<: *orchestrator-environment
      ORCHESTRATOR_MODE: worker
      ORCHESTRATOR_WORKER_PARTITIONS: ${ORCHESTRATOR_WORKER_0_PARTITIONS:-0,1,2,3,4,5,6,7}
    depends_on:
      - orchestrator-redis
    restart: unless-stopped

  hosted-orchestrator-worker-1:
    image: ${HOSTED_ORCHESTRATOR_IMAGE}:${HOSTED_ORCHESTRATOR_IMAGE_TAG:-latest-main}
    environment:
      <<: *orchestrator-environment
      ORCHESTRATOR_MODE: worker
      ORCHESTRATOR_WORKER_PARTITIONS: ${ORCHESTRATOR_WORKER_1_PARTITIONS:-8,9,10,11,12,13,14,15}
    depends_on:
      - orchestrator-redis
    restart: unless-stopped

  hosted-sites:
    image: ${HOSTED_SITES_IMAGE}:${HOSTED_SITES_IMAGE_TAG:-latest-main}
    environment:
      HOSTED_SITES_PORT: 3003
      HOSTED_SITES_PUBLIC_URL: ${HOSTED_SITES_PUBLIC_URL}
      HOSTED_ORCHESTRATOR_URL: ${HOSTED_ORCHESTRATOR_URL}
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
      HOSTED_SESSION_SWEEP_INTERVAL_MS: ${HOSTED_SESSION_SWEEP_INTERVAL_MS:-60000}
      HOSTED_SESSION_TERMINAL_RETENTION_MS: ${HOSTED_SESSION_TERMINAL_RETENTION_MS:-1800000}
      HOSTED_ACCESS_LOG_RETENTION_MS: ${HOSTED_ACCESS_LOG_RETENTION_MS:-1209600000}
      HOSTED_SESSION_REDIS_URL: ${HOSTED_SESSION_REDIS_URL}
      HOSTED_SESSION_REDIS_TTL_MS: ${HOSTED_SESSION_REDIS_TTL_MS:-21600000}
    depends_on:
      - session-redis
    restart: unless-stopped

  session-redis:
    image: ${HOSTED_SESSION_REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped

  orchestrator-redis:
    image: ${ORCHESTRATOR_REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    profiles:
      - redis-compat
    restart: unless-stopped

  gateway:
    image: ${GATEWAY_IMAGE:-nginx:1.27-alpine}
    platform: ${GATEWAY_PLATFORM:-linux/amd64}
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:80"
    volumes:
      - ../nginx/hosted-sites.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hosted-orchestrator
      - hosted-orchestrator-worker-0
      - hosted-orchestrator-worker-1
      - hosted-sites
      - session-redis
      - orchestrator-redis
    restart: unless-stopped
