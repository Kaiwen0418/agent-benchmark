name: agentbench-hosted-sites

services:
  hosted-orchestrator:
    image: ${HOSTED_ORCHESTRATOR_IMAGE}:${IMAGE_TAG}
    environment:
      HOSTED_ORCHESTRATOR_PORT: 3004
      HOSTED_ORCHESTRATOR_PUBLIC_URL: ${HOSTED_ORCHESTRATOR_PUBLIC_URL}
      HOSTED_SITES_URL: http://hosted-sites:3003
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      HOSTED_SESSION_SWEEP_INTERVAL_MS: ${HOSTED_SESSION_SWEEP_INTERVAL_MS:-60000}
      HOSTED_ACCESS_LOG_RETENTION_MS: ${HOSTED_ACCESS_LOG_RETENTION_MS:-1209600000}
    restart: unless-stopped

  hosted-sites:
    image: ${HOSTED_SITES_IMAGE}:${IMAGE_TAG}
    environment:
      HOSTED_SITES_PORT: 3003
      HOSTED_SITES_PUBLIC_URL: ${HOSTED_SITES_PUBLIC_URL}
      HOSTED_ORCHESTRATOR_URL: ${HOSTED_ORCHESTRATOR_URL}
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      HOSTED_SESSION_SWEEP_INTERVAL_MS: ${HOSTED_SESSION_SWEEP_INTERVAL_MS:-60000}
      HOSTED_SESSION_TERMINAL_RETENTION_MS: ${HOSTED_SESSION_TERMINAL_RETENTION_MS:-1800000}
      HOSTED_ACCESS_LOG_RETENTION_MS: ${HOSTED_ACCESS_LOG_RETENTION_MS:-1209600000}
    restart: unless-stopped

  gateway:
    image: caddy:2
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:80"
    volumes:
      - ../caddy/Caddyfile.hosted-sites:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - hosted-orchestrator
      - hosted-sites
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
