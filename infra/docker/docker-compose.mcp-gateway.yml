name: agentbench-mcp-gateway

services:
  mock-sites:
    build:
      context: ../..
      dockerfile: infra/docker/mock-sites.Dockerfile
    environment:
      MOCK_SITES_PORT: 3001
    restart: unless-stopped

  runner-mcp:
    build:
      context: ../..
      dockerfile: infra/docker/runner-mcp.Dockerfile
    environment:
      RUNNER_MCP_HTTP_HOST: 0.0.0.0
      RUNNER_MCP_HTTP_PORT: 8080
      RUNNER_MCP_PUBLIC_BASE_URL: ${RUNNER_MCP_PUBLIC_BASE_URL:-}
      MOCK_SITES_URL: http://mock-sites:3001
      AGENTBENCH_WEB_URL: ${AGENTBENCH_WEB_URL:-}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:-}
      RUNNER_ARTIFACTS_DIR: /var/agentbench/artifacts
      RUNNER_HEADLESS: "true"
    volumes:
      - runner-artifacts:/var/agentbench/artifacts
    depends_on:
      - mock-sites
    restart: unless-stopped

  gateway:
    image: caddy:2
    ports:
      - "8080:80"
    volumes:
      - ../caddy/Caddyfile.mcp-gateway:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - runner-mcp
      - mock-sites
    restart: unless-stopped

volumes:
  runner-artifacts:
  caddy-data:
  caddy-config:
