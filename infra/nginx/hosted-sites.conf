server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=5s ipv6=off;
  set $hosted_orchestrator http://hosted-orchestrator:3004;
  set $hosted_sites http://hosted-sites:3003;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  location = /orchestrator {
    proxy_pass $hosted_orchestrator/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /orchestrator/ {
    rewrite ^/orchestrator/(.*)$ /$1 break;
    proxy_pass $hosted_orchestrator;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass $hosted_sites;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
