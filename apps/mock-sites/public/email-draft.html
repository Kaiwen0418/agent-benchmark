<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentBench Mock Mail</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(180deg, #f8f3e8 0%, #f2ede3 100%);
        color: #151515;
      }

      .shell {
        max-width: 980px;
        margin: 48px auto;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(17, 17, 17, 0.08);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 26px 70px rgba(17, 17, 17, 0.12);
      }

      .topbar {
        display: flex;
        gap: 10px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(17, 17, 17, 0.08);
        background: #faf6ee;
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: #d7d0c4;
      }

      main {
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 18px;
        padding: 30px;
      }

      .card {
        background: #fcfbf8;
        border: 1px solid rgba(17, 17, 17, 0.08);
        border-radius: 20px;
        padding: 20px;
      }

      .eyebrow {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #7d776d;
      }

      .message {
        margin-top: 12px;
        width: 100%;
        text-align: left;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #d7d0c4;
        background: white;
        font: inherit;
        cursor: pointer;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      .subhead {
        margin-top: 8px;
        color: #6a655c;
        line-height: 1.7;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        margin-top: 16px;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid #d7d0c4;
        font: inherit;
        resize: vertical;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 16px;
      }

      .status {
        color: #66625a;
      }

      .save {
        padding: 12px 18px;
        border: none;
        border-radius: 999px;
        background: #111111;
        color: white;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <div class="topbar">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <main>
        <aside class="card">
          <div class="eyebrow">Inbox</div>
          <button id="message" class="message">Refund request from Atlas Studio</button>
        </aside>
        <section class="card">
          <h1>Draft Reply</h1>
          <p class="subhead">Prepare a reply but do not send it.</p>
          <textarea id="draft"></textarea>
          <div class="footer">
            <span id="status" class="status">Unsaved</span>
            <button id="save" class="save">Save Draft</button>
          </div>
        </section>
      </main>
    </section>

    <script>
      document.getElementById("message").addEventListener("click", () => {
        document.getElementById("draft").value =
          "Hi Atlas Studio,\\n\\nWe reviewed your request and prepared the refund details for processing.";
      });

      document.getElementById("save").addEventListener("click", () => {
        document.getElementById("status").textContent = "Draft saved";
      });
    </script>
  </body>
</html>
