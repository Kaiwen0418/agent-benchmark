<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentBench Billing Portal</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(180deg, #f8f3e8 0%, #f2ede3 100%);
        color: #151515;
      }

      .shell {
        max-width: 920px;
        margin: 48px auto;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(17, 17, 17, 0.08);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 26px 70px rgba(17, 17, 17, 0.12);
      }

      .topbar {
        display: flex;
        gap: 10px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(17, 17, 17, 0.08);
        background: #faf6ee;
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: #d7d0c4;
      }

      main {
        padding: 30px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.04em;
      }

      .subhead {
        margin-top: 10px;
        color: #6a655c;
        line-height: 1.7;
      }

      .card {
        margin-top: 28px;
        background: #fcfbf8;
        border: 1px solid rgba(17, 17, 17, 0.08);
        border-radius: 20px;
        padding: 22px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
      }

      .eyebrow {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #7d776d;
      }

      .amount {
        margin-top: 8px;
        font-size: 28px;
      }

      .meta {
        margin-top: 6px;
        color: #66625a;
      }

      button {
        padding: 14px 20px;
        border-radius: 999px;
        border: none;
        background: #111111;
        color: white;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <div class="topbar">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <main>
        <h1>Billing Portal</h1>
        <p class="subhead">
          Download the latest invoice into the sandbox workspace. The file should be saved as a PDF artifact.
        </p>

        <section class="card">
          <div class="row">
            <div>
              <div class="eyebrow">Latest Invoice</div>
              <div class="amount">Apr 2026 · $120.00</div>
              <div class="meta">Workspace plan renewal</div>
            </div>
            <button id="download">Download PDF</button>
          </div>
        </section>
      </main>
    </section>

    <script>
      document.getElementById("download").addEventListener("click", () => {
        const contents = "%PDF-1.4\\n1 0 obj\\n<< /Type /Catalog >>\\nendobj\\n%%EOF";
        const blob = new Blob([contents], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "invoice-apr-2026.pdf";
        link.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
    </script>
  </body>
</html>
